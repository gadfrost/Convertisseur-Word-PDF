<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertisseur Universel Word & PDF</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    
    <!-- Polices & Icônes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Bibliothèques externes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- Ajout de docx.js pour une vraie génération DOCX -->
    <script src="https://cdn.jsdelivr.net/npm/docx@7.1.0/build/index.js"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header>
            <div class="header-top">
                <h1><i class="fas fa-sync-alt"></i> Convertisseur Universel</h1>
                <button id="install-btn" class="install-btn">
                    <i class="fas fa-download"></i> Installer l'App
                </button>
            </div>
            <p>Word & PDF - 100% Gratuit & Sécurisé</p>
        </header>

        <div class="glass-card">
            <nav class="tabs">
                <button class="tab-btn active" id="btn-word-to-pdf" data-mode="word-to-pdf">
                    <i class="fas fa-file-word"></i> Word ➡️ PDF
                </button>
                <button class="tab-btn" id="btn-pdf-to-word" data-mode="pdf-to-word">
                    <i class="fas fa-file-pdf"></i> PDF ➡️ Word
                </button>
            </nav>

            <div class="content-section">
                <div id="drop-zone" class="drop-zone">
                    <div class="drop-zone-content">
                        <i id="file-icon" class="fas fa-cloud-upload-alt"></i>
                        <p id="drop-text">Glissez-déposez votre fichier ici ou <span>cliquez pour parcourir</span></p>
                        <p class="file-info" id="file-info-text">Fichiers acceptés : .docx</p>
                    </div>
                    <input type="file" id="file-input" hidden accept=".docx">
                </div>

                <div id="process-section" class="process-section hidden">
                    <div class="file-preview">
                        <i class="fas fa-file-alt"></i>
                        <span id="file-name">nom-du-fichier.docx</span>
                    </div>
                    
                    <div class="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    <p id="status-text">Prêt pour la conversion...</p>

                    <button id="convert-btn" class="primary-btn">Convertir maintenant</button>
                    
                    <div id="download-section" class="hidden">
                        <div class="success-icon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <p style="font-weight: 600; margin-bottom: 15px;">Conversion terminée avec succès !</p>
                        <button id="download-btn" class="download-btn">
                            <i class="fas fa-download"></i> Télécharger le fichier
                        </button>
                        <button id="reset-btn" class="secondary-btn">Convertir un autre fichier</button>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 - Outil 100% Client-Side (Confidentialité garantie)</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
